name: Keep Render awake

on:
  schedule:
    # Ping every 10 minutes (GitHub Actions minimum is 5 min, but 10 is enough)
    - cron: "*/10 * * * *"
  workflow_dispatch: # allow manual trigger too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 60 \
            https://weeklyproductpulse.onrender.com/api/health)
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: health check returned $STATUS (Render may still be cold-starting)"
          else
            echo "Render is awake."
          fi
