name: Keep Render awake

on:
  schedule:
    # Ping every 10 minutes (GitHub Actions minimum is 5 min, but 10 is enough)
    - cron: "*/10 * * * *"
  workflow_dispatch: # allow manual trigger too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          # bash runs with -e + pipefail; curl failures must not fail the job (keepalive is best-effort).
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            --max-time 60 \
            https://weeklyproductpulse.onrender.com/api/health || echo "000")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS (cold start, timeout, or transient network — not treated as workflow failure)"
          else
            echo "Render is awake."
          fi
