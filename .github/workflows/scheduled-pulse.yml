# WeeklyProductPulse — scheduled pipeline (Phase 1 → 4)
#
# Default: once per day at 10:00 UTC. GitHub `schedule` uses UTC only.
# For 10:00 India Standard Time (IST = UTC+5:30), use: `30 4 * * *`
#
# GitHub allows cron intervals as short as every 5 minutes (`*/5 * * * *`), but
# running the full pipeline every 5 minutes is not recommended (API cost / rate limits).
# Use workflow_dispatch for ad-hoc runs instead.

name: Scheduled weekly pulse

on:
  schedule:
    - cron: "0 10 * * *" # 10:00 UTC daily — adjust for your timezone (see comment above)
  workflow_dispatch:
    inputs:
      phase1_mode:
        description: "Phase 1 mode: auto (recommended), incremental, or backfill"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - incremental
          - backfill

permissions:
  contents: read

concurrency:
  group: weekly-pulse-scheduled
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Node (for npx + Google Docs MCP append)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify required Action secrets (Groq)
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [[ -z "${GROQ_API_KEY// }" ]]; then
            echo "::error::GROQ_API_KEY is missing or empty. Add it: Repo → Settings → Secrets and variables → Actions → New repository secret (name: GROQ_API_KEY)."
            exit 1
          fi
          echo "GROQ_API_KEY is set (value not shown)."

      # Scheduler always runs Phase 4 with --google-doc-append; CI does not read Railway or .env — only secrets below.
      - name: Verify Google Docs secrets (append is mandatory in this workflow)
        shell: bash
        env:
          GOOGLE_DOCS_DOCUMENT_ID: ${{ secrets.GOOGLE_DOCS_DOCUMENT_ID }}
        run: |
          if [[ -z "${GOOGLE_DOCS_DOCUMENT_ID// }" ]]; then
            echo "::error::GOOGLE_DOCS_DOCUMENT_ID is missing or empty. Railway and local .env are NOT used here. Add the same document ID as a repository secret named GOOGLE_DOCS_DOCUMENT_ID (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          echo "GOOGLE_DOCS_DOCUMENT_ID is set (value not shown)."

      - name: Write Google Docs MCP OAuth token (optional)
        shell: bash
        env:
          GOOGLE_DOCS_MCP_TOKEN_JSON: ${{ secrets.GOOGLE_DOCS_MCP_TOKEN_JSON }}
        run: |
          if [[ -n "${GOOGLE_DOCS_MCP_TOKEN_JSON:-}" ]]; then
            mkdir -p ~/.config/google-docs-mcp
            echo "$GOOGLE_DOCS_MCP_TOKEN_JSON" > ~/.config/google-docs-mcp/token.json
            echo "Wrote ~/.config/google-docs-mcp/token.json from secret."
          else
            echo "No GOOGLE_DOCS_MCP_TOKEN_JSON — Doc append via MCP may fail unless token exists."
          fi

      - name: Run scheduler (full pipeline)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_DOCS_DOCUMENT_ID: ${{ secrets.GOOGLE_DOCS_DOCUMENT_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_DOCS_APPEND_TRANSPORT: mcp
          LOG_LEVEL: INFO
          # Optional repo Variable SCHEDULER_SKIP_BACKFILL=1 to skip Phase 1 (needs data/consolidated/<week>_full.csv in workspace)
          SCHEDULER_SKIP_BACKFILL: ${{ vars.SCHEDULER_SKIP_BACKFILL }}
          # Priority: manual dispatch input > repo variable > default auto
          SCHEDULER_PHASE1_MODE: ${{ github.event.inputs.phase1_mode || vars.SCHEDULER_PHASE1_MODE || 'auto' }}
        run: python -m scheduler

      - name: Push reports to Railway backend
        if: success()
        shell: bash
        env:
          RAILWAY_URL: ${{ secrets.RAILWAY_PUBLIC_URL }}
          PULSE_WEB_API_TOKEN: ${{ secrets.PULSE_WEB_API_TOKEN }}
        run: |
          if [[ -z "${RAILWAY_URL:-}" ]]; then
            echo "::warning::RAILWAY_PUBLIC_URL secret not set — skipping report push to Railway."
            exit 0
          fi
          for f in data/reports/*_pulse.md; do
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f") to ${RAILWAY_URL}..."
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${RAILWAY_URL}/api/reports/upload" \
              -H "X-Pulse-API-Token: ${PULSE_WEB_API_TOKEN:-}" \
              -F "file=@${f}")
            if [[ "$status" -ge 200 && "$status" -lt 300 ]]; then
              echo "  ✓ $(basename "$f") uploaded (HTTP $status)"
            else
              echo "::error::Upload failed for $(basename "$f") — HTTP $status"
              exit 1
            fi
          done

      - name: Upload reports artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-pulse-reports
          path: data/reports/
          if-no-files-found: warn
