<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weekly Product Pulse — IndMoney</title>
  <meta name="description" content="Weekly Play Store review intelligence for IndMoney" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/app.css?v=6" />
</head>
<body>
  <div class="layout">
    <header class="top">
      <div class="brand">
        <img class="brand-logo" src="/assets/images/indmoney-logo.png" alt="IndMoney logo" onerror="this.style.display='none'" />
        <div>
          <p class="brand-kicker">IndMoney</p>
          <h1>Weekly Product Pulse</h1>
          <p class="tagline">Play Store review intelligence, updated every week</p>
        </div>
      </div>
      <div class="actions">
        <label class="field-label" for="week-select">Select week</label>
        <select id="week-select" aria-label="Select report week"></select>
        <button type="button" id="btn-refresh" class="btn secondary" aria-label="Refresh report">
          <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Refresh
        </button>
      </div>
    </header>

    <aside class="meta" id="meta-panel">
      <div class="meta-row">
        <span class="label">Viewing</span>
        <strong id="meta-week">—</strong>
      </div>
      <div class="meta-row">
        <span id="meta-status" class="meta-badge empty">Loading…</span>
      </div>
    </aside>

    <main class="content">
      <div id="status" class="status hidden" role="status"></div>
      <article id="report" class="report prose" aria-live="polite">
        <div class="loading-skeleton">
          <div class="skel-line w80"></div>
          <div class="skel-line w60"></div>
          <div class="skel-line w90"></div>
          <div class="skel-line w45"></div>
          <div class="skel-line w70"></div>
        </div>
      </article>
    </main>

    <section class="email-panel" aria-labelledby="email-panel-title">
      <div class="email-panel-header">
        <svg class="email-panel-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <h2 id="email-panel-title" class="email-panel-title">Share this report</h2>
      </div>
      <p class="email-panel-hint">
        Send the full weekly pulse to your team. Enter email addresses separated by commas.
      </p>
      <label for="email-recipients">Recipients</label>
      <textarea
        id="email-recipients"
        rows="2"
        autocomplete="email"
        placeholder="name@company.com, team-lead@company.com"
        spellcheck="false"
      ></textarea>
      <details class="advanced-settings">
        <summary>Advanced settings</summary>
        <div class="email-panel-row">
          <label for="api-token" class="label-optional">API token</label>
          <input type="password" id="api-token" autocomplete="off" placeholder="Enter token if required" />
        </div>
      </details>
      <div class="email-panel-actions">
        <button type="button" id="btn-email" class="btn primary">Send report</button>
      </div>
    </section>

    <footer class="foot">
      <span>WeeklyProductPulse</span>
      <span class="sep">&middot;</span>
      <span>IndMoney Customer Voice</span>
    </footer>
  </div>
  <div id="success-popup" class="popup-overlay hidden" role="dialog" aria-modal="true">
    <div class="popup-card">
      <div class="popup-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <h3 class="popup-title">Email sent successfully</h3>
      <p class="popup-detail" id="popup-detail"></p>
      <button type="button" class="btn primary popup-dismiss" id="popup-dismiss">Done</button>
    </div>
  </div>
  <script src="/assets/js/app.js?v=7" type="module"></script>
</body>
</html>
